name: Deploy to Emily

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: SamHexo/emily-tools
          token: ${{ secrets.EMILY_TOOLS_TOKEN }}
          path: emily-tools

      - run: bash emily-tools/deploy.sh grade-mle-task-agent-em
        env:
          EMILY_EMAIL: ${{ secrets.EMILY_EMAIL }}
          EMILY_PASSWORD: ${{ secrets.EMILY_PASSWORD }}
